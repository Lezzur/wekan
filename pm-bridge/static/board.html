<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cohort-3 Clinical Study — Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #dfe5ec; padding: 28px; font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  @keyframes omPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse { animation: omPulse 1.6s infinite; }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none !important; } }
  .card { transition: box-shadow .12s ease, border-color .12s ease, transform .12s ease; cursor: grab; }
  .card:hover { box-shadow: 0 6px 18px -10px rgba(20,40,70,.35); border-color: #cdd8e6; transform: translateY(-1px); }
  .card.dragging { opacity: .4; }
  .col-body.dragover { background: #dbe7f5; border-radius: 12px; }
  .nav a { text-decoration: none; }
  .modal-bg { position: fixed; inset: 0; background: rgba(22,32,43,.42); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal { background: #fff; border-radius: 16px; padding: 22px 24px; width: min(460px,100%); box-shadow: 0 30px 70px -30px rgba(0,0,0,.5); }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal"></div>
<script>
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let STATE = null;

function labelPill(l, alpha) {
  return `<span style="font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;background:${esc(l.color)}${alpha};color:${esc(l.color)};">${esc(l.name)}</span>`;
}

function cardEl(c, col) {
  const done = col.done;
  const labels = (c.labels || []).map(l => labelPill(l, done ? '18' : '22')).join('');
  const banner = c.blocked
    ? `<div style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#fff;background:#e0453e;border-radius:10px;padding:6px 12px;"><span class="pulse" style="width:7px;height:7px;border-radius:50%;background:#fff;"></span>Blocked · ${esc(STATE.blockedText || '')}</div>`
    : '';
  if (done) {
    return `<div class="card" draggable="true" data-id="${esc(c.id)}"
      style="background:#f6f9fc;border:1px solid #e6ecf2;border-radius:14px;padding:14px 15px;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${labels}</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#586374;line-height:1.35;text-wrap:pretty;"><span style="color:#3c9a5f;font-size:15px;">✓</span>${esc(c.title)}</div>
      <div class="mono" style="display:flex;align-items:center;gap:7px;font-size:11.5px;color:#98a1ad;">${esc(c.start)} → ${esc(c.end)}</div>
    </div>`;
  }
  return `<div class="card" draggable="true" data-id="${esc(c.id)}"
    style="background:#ffffff;border:1px solid #e3e9f0;border-radius:14px;padding:15px;display:flex;flex-direction:column;gap:9px;">
    ${banner}
    <div style="display:flex;flex-wrap:wrap;gap:6px;">${labels}</div>
    <div style="font-size:15px;font-weight:600;color:#1b2531;line-height:1.35;text-wrap:pretty;">${esc(c.title)}</div>
    <div style="font-size:13px;color:#68727f;line-height:1.45;">${esc(c.desc)}</div>
    <div class="mono" style="display:flex;align-items:center;gap:7px;font-size:11.5px;color:#8b94a0;">${esc(c.start)} → ${esc(c.end)}</div>
  </div>`;
}

function columnEl(col) {
  const header = col.done
    ? `<div style="display:flex;align-items:center;justify-content:space-between;background:#dfeee4;border-radius:12px;padding:10px 14px;">
         <span style="font-size:14px;font-weight:700;color:#2f4738;">${esc(col.name)}</span>
         <span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;font-size:12.5px;font-weight:600;color:#3c6249;background:#fff;border-radius:20px;padding:0 7px;">${col.count}</span>
       </div>`
    : `<div style="display:flex;align-items:center;justify-content:space-between;background:#e2ecf7;border-radius:12px;padding:10px 14px;">
         <span style="font-size:14px;font-weight:700;color:#2b3a4d;">${esc(col.name)}</span>
         <span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;font-size:12.5px;font-weight:600;color:#3d5573;background:#fff;border-radius:20px;padding:0 7px;">${col.count}</span>
       </div>`;
  const cards = col.cards.map(c => cardEl(c, col)).join('');
  return `<div style="display:flex;flex-direction:column;gap:13px;">
    ${header}
    <div class="col-body" data-list="${esc(col.listId)}" style="display:flex;flex-direction:column;gap:13px;min-height:40px;">${cards}</div>
  </div>`;
}

function render(data) {
  STATE = data;
  const cols = data.columns.map(columnEl).join('');
  document.getElementById('root').innerHTML = `
    <div style="max-width:1230px;margin:0 auto;background:#eef2f6;border-radius:18px;overflow:hidden;box-shadow:0 24px 60px -34px rgba(0,0,0,.45);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:#ffffff;border-bottom:1px solid #e1e7ee;">
        <div style="display:flex;align-items:center;gap:13px;">
          <div style="width:11px;height:11px;border-radius:50%;background:oklch(0.58 0.1 245);"></div>
          <div style="font-size:18px;font-weight:600;color:#16202b;letter-spacing:-0.01em;">${esc(data.title)}</div>
          <div style="font-size:13px;font-weight:500;color:#4c6079;background:#e8f0fa;border-radius:20px;padding:3px 12px;">${data.cardCount} cards</div>
        </div>
        <div class="nav" style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13.5px;font-weight:600;color:#fff;background:oklch(0.58 0.1 245);border-radius:22px;padding:7px 18px;">Board</span>
          <a href="/ui/dashboard" style="font-size:13.5px;color:#5a6675;padding:7px 8px;">Dashboard</a>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px;background:#eef2f6;">${cols}</div>
    </div>`;
  wireDrag();
  wireClick(data);
}

function wireClick(data) {
  const byId = {};
  data.columns.forEach(col => col.cards.forEach(c => byId[c.id] = { c, col }));
  document.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const { c } = byId[el.dataset.id] || {};
      if (c) openModal(c);
    });
  });
}

function openModal(c) {
  const labels = (c.labels || []).map(l => labelPill(l, '22')).join('');
  document.getElementById('modal').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)document.getElementById('modal').innerHTML=''">
      <div class="modal">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">${labels}</div>
        <div style="font-size:18px;font-weight:600;color:#16202b;line-height:1.3;margin-bottom:8px;">${esc(c.title)}</div>
        <div style="font-size:13.5px;color:#68727f;line-height:1.5;margin-bottom:14px;">${esc(c.desc) || '<em style="color:#98a1ad;">No description</em>'}</div>
        <div class="mono" style="font-size:12px;color:#8b94a0;">${esc(c.start)} → ${esc(c.end)}</div>
      </div>
    </div>`;
}

let dragId = null, dragFromList = null;
function wireDrag() {
  document.querySelectorAll('.card').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      dragFromList = el.closest('.col-body').dataset.list;
      el.classList.add('dragging');
      e.stopPropagation();
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
  document.querySelectorAll('.col-body').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('dragover'); });
    body.addEventListener('dragleave', () => body.classList.remove('dragover'));
    body.addEventListener('drop', async e => {
      e.preventDefault();
      body.classList.remove('dragover');
      const toList = body.dataset.list;
      if (!dragId || toList === dragFromList) return;
      await fetch('/ui/api/move', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ board: STATE.boardId, fromList: dragFromList, toList, card: dragId }),
      });
      load();
    });
  });
}

async function load() {
  try {
    const r = await fetch('/ui/api/board', { cache: 'no-store' });
    render(await r.json());
  } catch (e) {
    document.getElementById('root').innerHTML =
      `<div style="max-width:1230px;margin:40px auto;color:#8a2f2f;font-size:14px;">Board unavailable: ${esc(e.message)}</div>`;
  }
}
load();
setInterval(load, 20000);
</script>
</body>
</html>
