apiVersion: 1

# Load any dashboard JSON dropped into /var/lib/grafana/dashboards on startup.
providers:
  - name: pm-flow
    orgId: 1
    folder: "PM Flow"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
